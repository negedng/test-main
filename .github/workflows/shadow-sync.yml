name: Shadow Sync (Pull)

on:
  # Disabled until real repo URLs are configured in shadow/shadow-config.json.
  # Uncomment the cron schedule when ready:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:          # Manual trigger only

concurrency:
  group: shadow-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm --prefix shadow ci

      - name: Pull from other repos
        run: npx --prefix shadow tsx shadow/shadow-sync.ts --from b
